<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Gift 🎥</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

h2 {
  margin: 5px 0 10px;
  font-size: 18px;
}

/* 🎬 BASE CONTAINER */
.video-container {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 📱 MOBILE (REEL STYLE) */
@media (max-width: 600px) {
  .video-container {
    height: 90vh;
    aspect-ratio: 9/16;
  }
}

/* 📲 TABLET */
@media (min-width: 601px) and (max-width: 1024px) {
  .video-container {
    height: 85vh;
    aspect-ratio: 9/16;
  }
}

/* 💻 DESKTOP (LESS BLACK SPACE) */
@media (min-width: 1025px) {
  .video-container {
    width: 60%;
    height: 80vh;
  }
}

/* 🎥 VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 12px;
  background: black;
}

/* ▶️ ICON */
.play-icon {
  position: absolute;
  font-size: 60px;
  color: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* NEXT BUTTON */
#nextBtn {
  position: fixed;
  right: 40px;
  bottom: 40px;
  padding: 12px 25px;
  font-size: 16px;
  background: linear-gradient(45deg, #ff4d6d, #ff85a1);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  display: none;
  transform: scale(0);
  transition: transform 0.3s ease;
}

#nextBtn.show {
  display: block;
  transform: scale(1);
}
</style>
</head>

<body>

<h2>🎬 A Special Surprise For You</h2>

<div class="video-container">
  <!-- ✅ autoplay without muted (browser will still start muted internally) -->
  <video id="myVideo" autoplay playsinline controls>
    <source id="videoSource" src="" type="video/mp4">
  </video>

  <div id="icon" class="play-icon">⏸</div>
</div>

<button id="nextBtn">Next ➡</button>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const video = document.getElementById("myVideo");
  const source = document.getElementById("videoSource");
  const btn = document.getElementById("nextBtn");
  const icon = document.getElementById("icon");

  // 🎯 GET VIDEO FROM URL
  const params = new URLSearchParams(window.location.search);
  const videoFile = params.get("video");

  if (videoFile) {
    source.src = videoFile;
    video.load();
  }

  // 🔊 ENABLE SOUND AFTER FIRST USER CLICK
  document.body.addEventListener("click", function enableSound() {
    video.muted = false;
    video.volume = 1;
    document.body.removeEventListener("click", enableSound);
  });

  // SHOW NEXT BUTTON
  setTimeout(() => {
    btn.classList.add("show");
  }, 1500);

  // ▶ / ⏸ TAP
  video.addEventListener("click", function () {
    if (video.paused) {
      video.play();
      showIcon("▶");
    } else {
      video.pause();
      showIcon("⏸");
    }
  });

  // ⏩ ⏪ DOUBLE CLICK
  video.addEventListener("dblclick", function (e) {
    const rect = video.getBoundingClientRect();
    const clickX = e.clientX - rect.left;

    if (clickX > rect.width / 2) {
      video.currentTime += 5;
      showIcon("⏩");
    } else {
      video.currentTime = Math.max(0, video.currentTime - 5);
      showIcon("⏪");
    }
  });

  // ⌨️ KEYBOARD
  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowRight") {
      video.currentTime += 5;
      showIcon("⏩");
    }
    if (e.key === "ArrowLeft") {
      video.currentTime = Math.max(0, video.currentTime - 5);
      showIcon("⏪");
    }
  });

  // ICON
  function showIcon(symbol) {
    icon.innerText = symbol;
    icon.style.opacity = "1";

    setTimeout(() => {
      icon.style.opacity = "0";
    }, 600);
  }

  // NEXT BUTTON
  btn.addEventListener("click", function () {
    window.location.href = "gift.html" + window.location.search;
  });

});
</script>

</body>
</html>
