<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Arial;
  overflow: hidden;

  /* 🌈 Animated gradient background */
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🎀 CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 85%;
  max-width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* 🎂 TEXT */
.title {
  font-size: 22px;
  color: blueviolet;
  font-weight: bold;
}

/* 👤 NAME REVEAL */
#name {
  font-size: 45px;
  color: darkcyan;
  margin-top: 10px;
  font-weight: bold;
}

/* 🎉 CONFETTI */
.confetti {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  from {
    transform: translateY(-10vh);
    opacity: 1;
  }
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="title">
    🎂🌟Once Again Wishing
     Uh A VERY HAPPY
        BIRTHDAY 🎉✨
  </div>

  <!-- 👤 Name appears here -->
  <div id="name"></div>

  
</div>

<script>
// 👤 CHANGE NAME HERE
const yourName = "Nanaa💖"; // 🔥 change to any name

let i = 0;
function revealName() {
  if (i < yourName.length) {
    document.getElementById("name").innerHTML += yourName.charAt(i);
    i++;
    setTimeout(revealName, 100);
  }
}

setTimeout(revealName, 1000); // start after 1 sec

// 🎉 Confetti
const confettiIcons = ["🎉", "🎂", "✨", "🎈"];

function createConfetti() {
  let el = document.createElement("div");
  el.className = "confetti";
  el.innerHTML = confettiIcons[Math.floor(Math.random() * confettiIcons.length)];
  el.style.left = Math.random() * window.innerWidth + "px";
  el.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 6000);
}

setInterval(createConfetti, 300);
</script>

</body>
</html>
